<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

	<f:layout name="Default"/>

	<f:section name="Main">
	
		<f:variable name="bg" value="background-color:{flexFormData.bgcolor};" />			
		<f:variable name="bc" value="border-color:{flexFormData.bordercolor};" />	
		<f:variable name="bo" value="border-style:solid; border-width:{flexFormData.border}px;" />	

		<div class="containerbuttons spacing{flexFormData.spacing} padding{flexFormData.padding}  flex-wrap {flexFormData.format} Item{flexFormData.items} d-flex w-100 align-items-stretch">	
		
			<f:for each="{childrenContent}" as="child" iteration="iterator">
				<div class="containerbutton round{flexFormData.round}">
					<div class="containerbuttonInnen w-100 h-100" style="{bg} {bc} {bo}" >
					 	<f:format.raw>{child.renderedContent}</f:format.raw>
					 </div>
				</div>
			</f:for>
		</div>	
	</f:section>		

</html>
