<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

	<f:variable name="cl" value="color: {flexFormData.color}" />		
		
    <div id="c{data.uid}" class="frame-{data.CType} align-self-{flexFormData.valign} w-100 text-{flexFormData.textalign}" >
        <f:link.typolink parameter="{data.header_link}">
	        <f:if condition="{data.header_layout} != 100">
	          	<span class="d-block h{data.header_layout} m-0" style="{cl}"><f:format.nl2br>{data.header}</f:format.nl2br></span>
	         </f:if> 	
        	<f:format.nl2br><p class="m-0" style="{cl}">{data.bodytext}<p></f:format.nl2br>
        </f:link.typolink>
    </div>
</html>
